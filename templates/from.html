<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Placement Salary LPA Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 40%;
            margin: 50px auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
            color: #444;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: #4facfe;
            outline: none;
        }

        .btn-group {
            margin-top: 20px;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            margin: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        button[type="submit"] {
            background: #28a745;
            color: white;
        }

        button[type="submit"]:hover {
            background: #218838;
        }

        button[type="reset"] {
            background: #dc3545;
            color: white;
        }

        button[type="reset"]:hover {
            background: #c82333;
        }
    </style>

</head>

<body>

<div class="container">
    <h1>Salary LPA Form</h1>

    <form action="/" method="POST">

        <label>Gender</label>
        <select name="gender">
            <option value="0">Male</option>
            <option value="1">Female</option>
        </select>

        <label>Age</label>
        <input type="number" name="age">

        <label>HSC Percentage</label>
        <input type="number" name="hsc_percentage">

        <label>HSC Board</label>
        <select name="hsc_board">
            <option value="0">CBSE</option>
            <option value="1">ICSE</option>
            <option value="2">State</option>
        </select>

        <label>HSC Stream</label>
        <select name="hsc_stream">
            <option value="0">Arts</option>
            <option value="1">Commerce</option>
            <option value="2">Science</option>
        </select>

        <label>Degree Percentage</label>
        <input type="number" name="degree_percentage">

        <label>Degree Field</label>
        <select name="degree_field">
            <option value="0">Arts</option>
            <option value="1">Business</option>
            <option value="2">Engineering</option>
            <option value="3">Science</option>
        </select>

        <label>Internships Count</label>
        <input type="number" name="internships_count">

        <label>Projects Count</label>
        <input type="number" name="projects_count">

        <label>Certifications Count</label>
        <input type="number" name="certifications_count">

        <label>Technical Skills Score</label>
        <input type="number" placeholder="score 1 to 10" name="technical_skills_score">

        <label>Soft Skills Score</label>
        <input type="number" placeholder="score 1 to 10" name="soft_skills_score">

        <label>Aptitude Score</label>
        <input type="number" placeholder="score 1 to 10" name="aptitude_score">

        <label>Communication Score</label>
        <input type="number" placeholder="score 1 to 10" name="communication_score">

        <label>Work Experience (Months)</label>
        <input type="number" placeholder="your Experience" name="work_experience_months">

        <label>Backlogs</label>
        <input type="number" name="backlogs">

        <label>Placed</label>
        <select name="placed">
            <option value="1">Yes</option>
            <option value="0">No</option>
        </select>

        <div class="btn-group">
            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
        </div>

    </form>
</div>
</body>
</html>
