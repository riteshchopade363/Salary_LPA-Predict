<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Salary Result</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: #fff;
            padding: 40px;
            width: 350px;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .title {
            font-size: 22px;
            color: #333;
            margin-bottom: 10px;
        }

        .salary {
            font-size: 40px;
            font-weight: bold;
            color: #0072ff;
            margin: 20px 0;
        }

        .desc {
            color: #666;
            font-size: 16px;
        }

        .btn {
            margin-top: 25px;
            padding: 10px 20px;
            border: none;
            background: #0072ff;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        .btn:hover {
            background: #005edc;
        }
    </style>

</head>
<body>

    <div class="card">

        <div class="title">💼 Predicted Salary (LPA)</div>

        <div class="salary">
            ₹ {{ salaray_value }}
        </div>

        <p class="desc">
            Based on your profile, this is your estimated salary package.
        </p>

        <form action="/">
            <button class="btn">Check Again</button>
        </form>

    </div>

</body>
</html>
